<!DOCTYPE html>
<html lang="en">
git 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Furniture Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800 font-sans my-1.5 p-4">

  <!-- Navbar -->
  <nav class="flex items-center justify-between px-6 py-3 border-b-2 text-xs text-gray-600 flex-wrap gap-2 border-t-2 sticky top-0 z-50 bg-white">
    <div class="flex gap-4 flex-wrap">
      <a href="#" class="font-bold text-orange-500">HOME</a>
      <a href="#" class=" font-sans font-bold hover:text-orange-500">FURNITURE</a>
      <a href="#" class="  font-sans font-bold hover:text-orange-500">ALL PRODUCTS</a>
      <a href="#" class="  font-sans font-bold hover:text-orange-500">SHOP</a>
      <a href="#" class="  font-sans font-bold hover:text-orange-500">MOBILE</a>
      <a href="#" class=" font-sans font-bold hover:text-orange-500">OFFER</a>
      <a href="#" class=" font-sans font-bold hover:text-orange-500">DEAL</a>
      <a href="#" class=" font-sans font-bold hover:text-orange-500">BLOG</a>
      <a href="#" class=" font-sans font-bold hover:text-orange-500">CONTACT US</a>
      <a href="#" class=" font-sans font-bold hover:text-orange-500">CUSTOM MENU</a>
    </div>
    <div class="flex items-center gap-3">
      <span class="cursor-pointer mx-0.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></span>
      <span class="cursor-pointer"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></span>
    </div>
  </nav>






  <!-- Hero Section -->
  <section class="grid grid-cols-1 md:grid-cols-2 gap-2 p-4">
    <!-- Left: Main Hero -->
    <div
      class="relative bg-[#f9f8f9] rounded-lg overflow-hidden flex flex-col items-center justify-center p-8 min-h-[260px]">
      <span
        class="absolute top-36 right-32 bg-yellow-400 text-white font-bold rounded-full w-20 h-20 flex items-center justify-center text-sm">-30%</span>
      <img src="./c07a5346-70b5-463e-aacf-26cee2848cf7.png" alt="sofa" class="w-[35rem] object-contain mb-4 " />
      <p class="text-orange-500 font-semibold tracking-widest text-3xl">FURNITURE</p>
      <h2 class="text-6xl font-bold text-gray-800">WOOD STYLE</h2>
      <button class="bg-white mt-4 border border-gray-400 px-6 py-1 text-xs hover:bg-gray-200 transition">SHOP
        NOW</button>
      <div class="flex gap-2 mt-3">
        <span class="w-3 h-3 bg-red-500 rounded-sm inline-block"></span>
        <span class="w-3 h-3 bg-gray-300 rounded-sm inline-block"></span>
        <span class="w-3 h-3 bg-gray-300 rounded-sm inline-block"></span>
      </div>
    </div>





    <!-- Right: Side banners -->
    <div class="grid grid-rows-2 gap-2">
      <div class="bg-amber-50 rounded-lg overflow-hidden">
        <img class=" max-h-64 w-full" src="https://fama.ir/wp-content/uploads/2023/01/version-01.webp " alt="room"
          class="w-full h-full object-cover max-h-36" />
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div class="bg-purple-50 rounded-lg flex items-center justify-center p-3 text-center">
          <div>
            <img src="https://fama.ir/wp-content/uploads/2023/01/01-6.webp" alt="sofa italia"
              class="w-full object-contain max-h-44" />
            <div class="mb-6">
              <span class="font-light text-4xl text-gray-800 tracking-wide">SOFA</span>
              <span class="font-extrabold text-4xl text-blue-400 tracking-wide">ITALIA</span>
            </div>
          </div>
        </div>

        <div class="relative bg-red-50 rounded-lg flex items-center justify-center p-3">
          <span class="absolute top-[6.5rem] right-[3.5rem] bg-[#fefefe] shadow-[_-1px_7px_7px_1px_#c49860] text-[#c49860] rounded-full px-1 text-[25px] flex items-center justify-center text-center w-[70px] h-[70px]">-15%</span>
          <img src="https://fama.ir/wp-content/uploads/2021/12/Chair-Roza-1-1-300x361.webp" alt="chair"
            class="object-contain max-h-44" />
        </div>
      </div>
    </div>
  </section>

  <!-- Tab Section -->
  <section class="px-4 py-6">
    <div class="flex gap-6 border-b mb-6 text-sm font-semibold">
      <button id="tab-latest" onclick="switchTab('latest')"
        class="pb-2 border-b-2 border-orange-500 text-orange-500">LATEST</button>
      <button id="tab-saleoff" onclick="switchTab('saleoff')"
        class="pb-2 border-b-2 border-transparent text-gray-500 hover:text-orange-500">SALE OFF</button>
      <button id="tab-bestsale" onclick="switchTab('bestsale')"
        class="pb-2 border-b-2 border-transparent text-gray-500 hover:text-orange-500">BEST SALE</button>
    </div>

    <!-- Products Grid -->
    <div id="products" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>

    <div class="text-center mt-6">
      <button id="load-more-btn" class="border border-gray-300 px-8 py-2 text-xs hover:bg-gray-100 transition">LOAD MORE ITEMS</button>
    </div>

  </section>
 
   

</body>
<script src="tab section.js"></script>
</html>
