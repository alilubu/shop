<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-700">





    <main class="max-w-7xl mx-auto px-6 py-8">

        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-xs text-gray-400 mb-2">🏠 Shopping cart</p>
                <h1 class="text-2xl font-semibold uppercase">
                    Shopping Cart
                </h1>
            </div>

            <button
                class="border px-5 py-2 text-xs uppercase hover:bg-gray-100 transition">
                Proceed To Checkout
            </button>
        </div>

        <div class="border">

            
            <div
                class="grid grid-cols-[80px_1fr_140px_120px_140px_60px] border-b text-xs uppercase font-medium">

                <div class="p-4"></div>
                <div class="p-4">Product Name</div>
                <div class="p-4 text-center">Unit Price</div>
                <div class="p-4 text-center">Qty</div>
                <div class="p-4 text-center">Sub Total</div>
                <div class="p-4"></div>
            </div>

            
            <div
                class="grid grid-cols-[80px_1fr_140px_120px_140px_60px] border-b items-center">

                <div class="p-4">
                    <div class="w-14 h-14 bg-gray-100 border flex items-center justify-center">
                        <img src="https://picsum.photos/300/200?1" alt="">
                    </div>
                </div>

                <div class="p-4">
                    Modular Modern
                </div>

                <div class="text-center">
                    $659.00
                </div>

                <div class="text-center">
                    <input
                        type="number"
                        value="1"
                        class="w-16 border text-center py-1">
                </div>

                <div class="text-center">
                    $659.00
                </div>

                <div class="text-center text-gray-500 hover:text-red-500 cursor-pointer">
                    ✕
                </div>
            </div>

            
            <div
                class="grid grid-cols-[80px_1fr_140px_120px_140px_60px] border-b items-center">

                <div class="p-4">
                    <div class="w-14 h-14 bg-gray-100 border flex items-center justify-center">
                        <img src="https://picsum.photos/300/200?2" alt="">
                    </div>
                </div>

                <div class="p-4">
                    Modular Modern
                </div>

                <div class="text-center">
                    $659.00
                </div>

                <div class="text-center">
                    <input
                        type="number"
                        value="1"
                        class="w-16 border text-center py-1">
                </div>

                <div class="text-center">
                    $659.00
                </div>

                <div class="text-center text-gray-500 hover:text-red-500 cursor-pointer">
                    ✕
                </div>
            </div>

            
            <div
                class="grid grid-cols-[80px_1fr_140px_120px_140px_60px] items-center">

                <div class="p-4">
                    <div class="w-14 h-14 bg-gray-100 border flex items-center justify-center">
                        <img src="https://picsum.photos/300/200?3" alt="">
                    </div>
                </div>

                <div class="p-4">
                    Modular Modern
                </div>

                <div class="text-center">
                    $659.00
                </div>

                <div class="text-center">
                    <input
                        type="number"
                        value="1"
                        class="w-16 border text-center py-1">
                </div>

                <div class="text-center">
                    $659.00
                </div>

                <div class="text-center text-gray-500 hover:text-red-500 cursor-pointer">
                    ✕
                </div>
            </div>

        </div>

        
        <div class="flex justify-between mt-6">
            <button
                class="border px-5 py-2 text-xs uppercase hover:bg-gray-100">
                Continue Shopping
            </button>

            <div class="flex gap-3">
                <button
                    class="border px-5 py-2 text-xs uppercase hover:bg-gray-100">
                    Update Shopping Cart
                </button>

                <button
                    class="border px-5 py-2 text-xs uppercase hover:bg-gray-100">
                    Clear Shopping Cart
                </button>
            </div>
        </div>

    </main>

</body>
</html>
