<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shopping Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-white text-gray-700">


    <nav
        class="flex items-center justify-between px-6 py-3 border-b-2 text-xs text-gray-600 flex-wrap gap-2 border-t-2 sticky top-0 z-50 bg-white">
        <div class="flex gap-4 flex-wrap">

            <a href="#" class="font-bold text-orange-500">HOME</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">FURNITURE</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">ALL PRODUCTS</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">SHOP</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">MOBILE</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">OFFER</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">DEAL</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">BLOG</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">CONTACT US</a>
            <a href="#" class=" font-sans font-bold hover:text-orange-500">CUSTOM MENU</a>

        </div>

        <div class="flex items-center gap-3">

            <span class="cursor-pointer mx-0.5"><svg class="w-4 h-4" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg></span>

            <span class="cursor-pointer"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z">
                    </path>
                </svg></span>

        </div>
    </nav>



    <main class="max-w-6xl mx-auto px-4 md:px-6 py-10">

        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">

            <div>
                <p class="text-xs text-gray-400">🏠 Shopping Cart</p>
                <h1 class="text-2xl font-semibold uppercase">Shopping Cart</h1>
            </div>

            <button id="proceed-checkout"
                class="border px-6 py-2 text-xs uppercase hover:bg-gray-100 transition w-full md:w-auto">
                Proceed To Checkout
            </button>

        </div>

        <!-- TABLE -->
        <div class="border overflow-x-auto">

            <!-- HEADER ROW -->
            <div class="min-w-[700px] grid grid-cols-[80px_1fr_140px_120px_140px_60px]
                        text-xs uppercase font-semibold border-b bg-gray-50">

                <div class="p-4"></div>
                <div class="p-4">Product Name</div>
                <div class="text-center p-4">Unit Price</div>
                <div class="text-center p-4">Qty</div>
                <div class="text-center p-4">Sub Total</div>
                <div></div>

            </div>

            <!-- ITEMS -->
            <div id="full-cart-items" class="min-w-[700px]"></div>

        </div>



        <!-- BOTTOM BUTTONS -->
        <div class="flex flex-col md:flex-row justify-between mt-6 gap-3">

            <a href="../../index.html"
                class="border px-6 py-2 text-xs uppercase hover:bg-gray-100 transition text-center">
                Continue Shopping
            </a>

            <div class="flex flex-col md:flex-row gap-3">

                <button id="update-cart"
                    class="border px-6 py-2 text-xs uppercase hover:bg-gray-100 transition w-full md:w-auto">
                    Update Shopping Cart
                </button>

                <button id="clear-cart"
                    class="border px-6 py-2 text-xs uppercase hover:bg-red-50 transition w-full md:w-auto">
                    Clear Shopping Cart
                </button>

            </div>

        </div>

    </main>



    <div id="cart-modal"
        class="fixed right-0 top-16 max-h-[85vh] w-[320px] bg-white shadow-xl p-6 hidden flex flex-col z-50">

        <div id="cart-items" class="flex-grow overflow-y-auto pr-2"></div>

        <div class="py-4 mt-2 text-right">
            <span class="text-gray-600">Total: </span>
            <span id="cart-total" class="text-xl font-extrabold text-gray-900">$ 0.00</span>
        </div>

        <div class="pt-2 border-t border-gray-200">
            <button id="checkout-btn"
                class="w-full border-2 border-black py-3 text-black font-semibold uppercase tracking-wide hover:bg-black hover:text-white transition-all">
                CHECK OUT
            </button>
        </div>

    </div>



</body>

<script src="../scripts/cart.js"></script>

</html>
